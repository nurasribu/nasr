<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>N4SR</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<nav>
  <div class="brand"><a href="/">N4SR</a></div>
  <ul>
    <li><a href="/">Home</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>
</header>

<main class="site-main">
  <div id="content"></div>
</main>

<script>
const blogFiles = [
];

const topicMeta = {
  philosophy:      { name: 'personal philosophy',      desc: 'first principles, thinking, understanding' },
  technology:      { name: 'technology and AI',         desc: 'AI, software, tools, building' },
  culture:         { name: 'culture and politics',      desc: 'Islam, Sarawak, Malay Identity, Malaysia' },
  mentalmodes:     { name: 'mental modes',              desc: 'observation, theory, reflections' },
  fiction:         { name: 'fiction',                   desc: 'poems, short fiction, scripts, manuscripts' },
};

function parseMd(raw){
  const lines = raw.trim().split('\n');
  let title = lines[0].replace(/^#\s*/, '');
  let meta = lines[1] || '';
  let topics = [];
  if (lines[2] && lines[2].startsWith('topics:')){
    topics = lines[2].replace('topics:', '').split(',').map(t => t.trim()).filter(Boolean);
  }
  return { title, meta, topics };
}

async function init(){
  const topic = new URLSearchParams(location.search).get('topic');
  const container = document.getElementById('content');

  const allPosts = [];
  for (const path of blogFiles){
    const id = path.replace('blog/', '').replace('.md', '');
    const res = await fetch(path);
    const { title, meta, topics } = parseMd(await res.text());
    const parts = meta.split('·').map(s => s.trim());
    const date = parts.length > 1 ? parts[parts.length - 1] : meta;
    allPosts.push({ id, title, meta, date, topics });
  }

  if (topic === 'timetravel'){
    document.title = 'Time Travel Series - nasr';
    const filtered = allPosts.filter(p => p.topics.includes(topic));
    let listHtml = filtered.length
      ? filtered.map(p => `<li><a href="post.html?id=${p.id}"><span>${p.title}</span><span class="date">${p.date}</span></a></li>`).join('')
      : '<li style="opacity:.5;padding:.8rem 0;border:none">No posts in this series yet.</li>';
    container.innerHTML = `
      <p class="series-label">Series</p>
      <h1>Time Travel Series</h1>
      <p class="tagline">Come with me! We'll test the same subjects across different eras and see how the meaning morph</p>
      <ul class="entries">${listHtml}</ul>
      <p style="margin-top:1.5rem"><a href="blog.html" class="back">&larr; all posts</a></p>
    `;
  } else if (topic && topicMeta[topic]){
    const meta = topicMeta[topic];
    document.title = meta.name + ' - nasr';
    const filtered = allPosts.filter(p => p.topics.includes(topic));
    let listHtml = filtered.length
      ? filtered.map(p => `<li><a href="post.html?id=${p.id}"><span>${p.title}</span><span class="date">${p.date}</span></a></li>`).join('')
      : '<li style="opacity:.5;padding:.8rem 0;border:none">No posts with this topic yet.</li>';
    container.innerHTML = `
      <h1>${meta.name}</h1>
      <p class="tagline">${meta.desc}</p>
      <ul class="entries">${listHtml}</ul>
      <p style="margin-top:1.5rem"><a href="blog.html" class="back">&larr; all posts</a></p>
    `;
  } else {
    const listHtml = allPosts.map(p =>
      `<li><a href="post.html?id=${p.id}"><span>${p.title}</span><span class="date">${p.date}</span></a></li>`
    ).join('');
    container.innerHTML = `<h1>Blog</h1><ul class="entries">${listHtml}</ul>`;
  }
}
init();
</script>

</body>
</html>
