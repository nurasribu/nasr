<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>N4SR</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<nav>
  <div class="brand"><a href="/">N4SR</a></div>
  <ul>
    <li><a href="/">Home</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>
</header>

<main class="site-main">
<a class="back" href="/">&larr; back</a>
<article id="entry"></article>
</main>

<script>
function parseMd(raw){
  const lines = raw.trim().split('\n');
  let title = lines[0].replace(/^#\s*/, '');
  let meta = lines[1] || '';
  let body = lines.slice(2).join('\n').trim();
  return { title, meta, body };
}

async function init(){
  const id = new URLSearchParams(location.search).get('id'); if (!id) { window.location.replace('readings.html'); return; }
  const el = document.getElementById('entry');
  try {
    const res = await fetch(`reading/${id}.md`);
    if (!res.ok) throw new Error('not found');
    const { title, meta, body } = parseMd(await res.text());
    document.title = title + ' - nasr';
    el.innerHTML = `
      <h1>${title}</h1>
      <span class="meta">${meta}</span>
      ${(() => {
        const lines = body.split('\n').filter(l => l.trim());
        let html = '', inBlock = false;
        for (const l of lines) {
          if (l.startsWith('> ')) {
            if (!inBlock) { html += '<blockquote>'; inBlock = true; }
            html += l.slice(2) + ' ';
          } else {
            if (inBlock) { html += '</blockquote>'; inBlock = false; }
            html += '<p>' + l + '</p>';
          }
        }
        if (inBlock) html += '</blockquote>';
        return html;
      })()}
    `;
  } catch (e) {
    el.innerHTML = `<p>Not found.</p>`;
  }
}
init();
</script>

</body>
</html>
