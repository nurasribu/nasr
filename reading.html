<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>N4SR</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<nav>
  <div class="brand"><a href="/">N4SR</a></div>
  <ul>
    <li><a href="/">Home</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>
</header>

<main class="site-main">
<a class="back" href="/">&larr; back</a>
<article id="entry"></article>
</main>

<script>
function parseMd(raw){
  const lines = raw.trim().split('\n');
  let title = lines[0].replace(/^#\s*/, '');
  let meta = lines[1] || '';
  let body = lines.slice(2).join('\n').trim();
  return { title, meta, body };
}

async function init(){
  const id = new URLSearchParams(location.search).get('id') || 'book1';
  const el = document.getElementById('entry');
  try {
    const res = await fetch(`reading/${id}.md`);
    if (!res.ok) throw new Error('not found');
    const { title, meta, body } = parseMd(await res.text());
    document.title = title + ' - nasr';
    el.innerHTML = `
      <h1>${title}</h1>
      <span class="meta">${meta}</span>
      ${body.split('\n').filter(l => l.trim()).map(l => l.startsWith('> ') ? `<blockquote>${l.slice(2)}</blockquote>` : `<p>${l}</p>`).join('')}
    `;
  } catch (e) {
    el.innerHTML = `<p>Not found.</p>`;
  }
}
init();
</script>

</body>
</html>
